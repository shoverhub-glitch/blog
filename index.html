<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Prevent theme flash - must be first -->
    <script>
      (function() {
        var mode = localStorage.getItem('theme-mode');
        if (!mode) {
          mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', mode);
        var colors = mode === 'dark' ? {
          bg: '#0C0C0B',
          text: '#F5F5F3',
          surface: '#1A1A19',
          surfaceHover: '#252524',
          border: '#2A2A29',
          borderLight: '#222221'
        } : {
          bg: '#FAFAF8',
          text: '#1A1A19',
          surface: '#F5F5F2',
          surfaceHover: '#EBEBE8',
          border: '#E5E5E0',
          borderLight: '#ECECEC'
        };
        var root = document.documentElement;
        root.style.setProperty('--bg-color', colors.bg);
        root.style.setProperty('--text-color', colors.text);
        root.style.setProperty('--surface-color', colors.surface);
        root.style.setProperty('--surface-hover', colors.surfaceHover);
        root.style.setProperty('--border-color', colors.border);
        root.style.setProperty('--border-light', colors.borderLight);
        root.style.backgroundColor = colors.bg;
        root.style.color = colors.text;
      })();
    </script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Theme -->
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0C0B" media="(prefers-color-scheme: dark)" />
    
    <!-- Security Meta Tags -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="X-Content-Type-Options" content="nosniff" />
    <meta name="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta name="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    
    <!-- SEO Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <title>ShoverHub Blog - Ideas Worth Sharing</title>
    <meta name="title" content="ShoverHub Blog - Ideas Worth Sharing" />
    <meta name="description" content="Insights, tutorials, and stories from the ShoverHub team. Building apps, websites, and digital tools - Ideas Worth Sharing." />
    <meta name="keywords" content="ShoverHub, blog, tutorials, technology, app development, web development, digital product, innovation" />
    <meta name="author" content="ShoverHub" />
    <meta name="language" content="English" />
    <link rel="canonical" href="https://blog.shoverhub.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://blog.shoverhub.com/" />
    <meta property="og:title" content="ShoverHub Blog - Ideas Worth Sharing" />
    <meta property="og:description" content="Insights, tutorials, and stories from the ShoverHub team. Building apps, websites, and digital tools - Ideas Worth Sharing." />
    <meta property="og:image" content="https://blog.shoverhub.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ShoverHub" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://blog.shoverhub.com/" />
    <meta name="twitter:title" content="ShoverHub Blog - Ideas Worth Sharing" />
    <meta name="twitter:description" content="Insights, tutorials, and stories from the ShoverHub team. Building apps, websites, and digital tools - Ideas Worth Sharing." />
    <meta name="twitter:image" content="https://blog.shoverhub.com/og-image.png" />
    <meta name="twitter:site" content="@shoverhub" />
    
    <!-- Performance - Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" />
    
    <!-- Google Fonts with font-display: swap for performance -->
    <link rel="preconnect" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" />
    </noscript>
    <style>
      body { font-family: 'DM Sans', system-ui, sans-serif; }
    </style>
    
    <!-- Defer AdSense for faster initial load -->
    <script>
      window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544';
        script.async = true;
        script.crossorigin = 'anonymous';
        document.head.appendChild(script);
      }, { passive: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
